name: Hourly Calendar Sync

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger server-side calendar sync
        env:
          CALENDAR_SYNC_URL: ${{ secrets.CALENDAR_SYNC_URL }}
          CALENDAR_SYNC_TOKEN: ${{ secrets.CALENDAR_SYNC_TOKEN }}
        run: |
          if [[ -z "$CALENDAR_SYNC_URL" || -z "$CALENDAR_SYNC_TOKEN" ]]; then
            echo "Missing CALENDAR_SYNC_URL or CALENDAR_SYNC_TOKEN secret"
            exit 1
          fi

          normalized_calendar_sync_token="$(printf '%s' "$CALENDAR_SYNC_TOKEN" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g; s/^[Bb]earer[[:space:]]+//')"

          if [[ -z "$normalized_calendar_sync_token" ]]; then
            echo "CALENDAR_SYNC_TOKEN secret is empty after normalization"
            exit 1
          fi

          http_code=$(curl --silent --show-error --output /tmp/hourly-sync-response.txt --write-out "%{http_code}" \
            -X POST "$CALENDAR_SYNC_URL" \
            -H "Authorization: Bearer $normalized_calendar_sync_token" \
            -H "Content-Type: application/json" \
            -d '{"force": false}')

          echo "Hourly sync HTTP status: $http_code"

          if [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
            echo "Unexpected HTTP status from calendar sync endpoint: $http_code"
            echo "Response body:"
            cat /tmp/hourly-sync-response.txt
            exit 1
          fi
