name: Hourly Calendar Sync

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger server-side calendar sync
        env:
          CALENDAR_SYNC_URL: ${{ secrets.CALENDAR_SYNC_URL }}
          CALENDAR_SYNC_TOKEN: ${{ secrets.CALENDAR_SYNC_TOKEN }}
        run: |
          if [[ -z "$CALENDAR_SYNC_URL" || -z "$CALENDAR_SYNC_TOKEN" ]]; then
            echo "Missing CALENDAR_SYNC_URL or CALENDAR_SYNC_TOKEN secret"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "$CALENDAR_SYNC_URL" \
            -H "Authorization: Bearer $CALENDAR_SYNC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"force": false}'
